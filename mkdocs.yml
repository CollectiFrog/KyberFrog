site_name: KyberFrog
site_description: >-
  Orchestration layer on top of Kyber (QUIC video transport) — publish any
  source as N independent transmitters and supervise the viewers, for
  low-latency LAN streaming (a drop-in replacement for NDI).
site_url: https://kyber-frog.gitlab.io/kyberfrog/
repo_url: https://gitlab.com/kyber-frog/kyberfrog
repo_name: kyber-frog/kyberfrog
edit_uri: -/edit/main/docs/
copyright: KyberFrog — AGPL-3.0

theme:
  name: material
  language: en
  icon:
    logo: material/transit-connection-variant
    repo: fontawesome/brands/gitlab
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - User Manual:
      - user/index.md
      - Installation: user/installation.md
      - Getting started: user/getting-started.md
      - Troubleshooting: user/troubleshooting.md
      - FAQ: user/faq.md
  - Developer:
      - dev/index.md
      - Architecture: dev/architecture.md
      - Building from source: dev/building.md
      - Releasing & CI: dev/releasing.md
      - Contributing: dev/contributing.md
      - "E2E: Spout output": E2E-spout-output.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
