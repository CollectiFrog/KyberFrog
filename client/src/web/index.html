<!DOCTYPE html>
<!-- SPDX-License-Identifier: AGPL-3.0-or-later -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KyberFrog client</title>
  <style>
    :root {
      --bg: #14161a; --panel: #1d2026; --line: #2b2f37; --field: #0f1115;
      --fg: #e6e8ec; --muted: #8a909b; --accent: #4da3ff;
      --ok: #3ad16f; --warn: #f2b134; --bad: #ec5b5b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    header { display: flex; align-items: baseline; gap: .75rem; flex-wrap: wrap;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--line); }
    header h1 { font-size: 1.15rem; margin: 0; font-weight: 600; }
    header .machine { color: var(--muted); font-size: .9rem; }
    header .spacer { flex: 1; }
    #updated { color: var(--muted); font-size: .8rem; }
    main { padding: 1.25rem; max-width: 1000px; margin: 0 auto; }
    h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 1.5rem 0 .6rem; }
    .card { background: var(--panel); border: 1px solid var(--line);
      border-radius: 10px; padding: .9rem 1.1rem; margin-bottom: .75rem; }
    .row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .dot.running { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .dot.starting, .dot.restarting { background: var(--warn); }
    .dot.stopped { background: var(--bad); }
    .id { font-weight: 600; }
    .state { color: var(--muted); font-size: .85rem; text-transform: capitalize; }
    .grow { flex: 1; }
    label { color: var(--muted); font-size: .85rem; display: inline-flex;
      align-items: center; gap: .35rem; }
    input[type=text], input[type=number] { background: var(--field);
      border: 1px solid var(--line); border-radius: 6px; color: var(--fg);
      padding: .4rem .55rem; font-size: .9rem; }
    input.server { width: 11rem; } input.port { width: 5.5rem; }
    .actions { margin-top: .7rem; display: flex; gap: .5rem; flex-wrap: wrap; }
    button { background: #262b33; color: var(--fg); border: 1px solid var(--line);
      border-radius: 6px; padding: .4rem .7rem; font-size: .85rem; cursor: pointer; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #062138; border: 0; font-weight: 600; }
    button.danger:hover { border-color: var(--bad); color: var(--bad); }
    .add { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    select, pre { font-family: ui-monospace, Consolas, monospace; }
    pre { background: var(--field); border: 1px solid var(--line); border-radius: 8px;
      padding: .7rem .9rem; font-size: .78rem; color: #cdd3dc; height: 16rem;
      overflow: auto; white-space: pre-wrap; word-break: break-word; margin: 0; }
    .empty { color: var(--muted); padding: 1rem 0; }
    .logbar { display: flex; gap: .5rem; align-items: center; margin-bottom: .5rem; }
    select { background: var(--field); border: 1px solid var(--line); color: var(--fg);
      border-radius: 6px; padding: .35rem .5rem; }
  </style>
</head>
<body>
  <header>
    <h1>KyberFrog client 🐸</h1>
    <span class="machine" id="machine"></span>
    <span class="spacer"></span>
    <span id="updated"></span>
  </header>
  <main>
    <h2>Instances kyclient</h2>
    <div id="instances"><div class="empty">Loading…</div></div>

    <div class="card">
      <div class="add">
        <input type="text" id="add-server" class="server" placeholder="IP du transmetteur" />
        <input type="number" id="add-port" class="port" placeholder="port" />
        <label><input type="checkbox" id="add-fullscreen" checked /> plein écran</label>
        <button class="primary" onclick="addInstance()">+ Ajouter</button>
      </div>
    </div>

    <h2>Logs</h2>
    <div class="logbar">
      <select id="log-source" onchange="refreshLogs()"></select>
      <button onclick="refreshLogs()">↻</button>
    </div>
    <pre id="logs">—</pre>
  </main>

  <script>
    let renderedIds = "";

    async function api(method, url, body) {
      const opt = { method };
      if (body !== undefined) {
        opt.headers = { "Content-Type": "application/json" };
        opt.body = JSON.stringify(body);
      }
      const r = await fetch(url, opt);
      return r.json();
    }

    function dot(status) { return `<span class="dot ${status}"></span>`; }

    function machineLine(d) {
      const ip = (d.ips && d.ips.length) ? d.ips.join(", ") : "ip ?";
      return `🖥 ${d.hostname} · ${ip}`;
    }

    function instanceCard(i) {
      return `<div class="card" data-id="${i.id}">
        <div class="row">
          <span id="status-${i.id}">${dot(i.status)}</span>
          <span class="id">${i.id}</span>
          <span class="state" id="state-${i.id}">${i.status}</span>
          <span class="grow"></span>
          <button class="danger" onclick="removeInstance('${i.id}')">✕</button>
        </div>
        <div class="row" style="margin-top:.6rem">
          <label>IP:port
            <input type="text" class="server" id="server-${i.id}" value="${i.server}" />
            <input type="number" class="port" id="port-${i.id}" value="${i.port}" />
          </label>
          <label><input type="checkbox" id="fs-${i.id}" ${i.fullscreen ? "checked" : ""} /> plein écran</label>
        </div>
        <div class="actions">
          <button class="primary" onclick="applyInstance('${i.id}')">Appliquer</button>
          <button onclick="ctrl('${i.id}','start')">Lancer</button>
          <button onclick="ctrl('${i.id}','stop')">Stop</button>
          <button onclick="ctrl('${i.id}','restart')">Redémarrer</button>
        </div>
      </div>`;
    }

    function render(d) {
      document.getElementById("machine").textContent = machineLine(d);
      const ids = d.instances.map(i => i.id).join(",");
      if (ids !== renderedIds) {
        // Set of instances changed: rebuild the list and the log selector.
        renderedIds = ids;
        const box = document.getElementById("instances");
        box.innerHTML = d.instances.length
          ? d.instances.map(instanceCard).join("")
          : '<div class="empty">Aucune instance. Ajoute-en une ci-dessous.</div>';
        const sel = document.getElementById("log-source");
        const prev = sel.value;
        sel.innerHTML = '<option value="client">kyberfrog-client</option>'
          + d.instances.map(i => `<option value="${i.id}">kyclient · ${i.id}</option>`).join("");
        if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
      } else {
        // Same instances: only refresh the status badges (keep edits intact).
        for (const i of d.instances) {
          const s = document.getElementById("status-" + i.id);
          const t = document.getElementById("state-" + i.id);
          if (s) s.innerHTML = dot(i.status);
          if (t) t.textContent = i.status;
        }
      }
      document.getElementById("updated").textContent = "maj " + new Date().toLocaleTimeString();
    }

    function form(id) {
      return {
        server: document.getElementById("server-" + id).value.trim(),
        port: parseInt(document.getElementById("port-" + id).value, 10) || 0,
        fullscreen: document.getElementById("fs-" + id).checked,
      };
    }

    async function addInstance() {
      const server = document.getElementById("add-server").value.trim();
      const port = parseInt(document.getElementById("add-port").value, 10) || 0;
      const fullscreen = document.getElementById("add-fullscreen").checked;
      if (!server || !port) { alert("Renseigne une IP et un port."); return; }
      render(await api("POST", "/instances", { server, port, fullscreen }));
      document.getElementById("add-server").value = "";
      document.getElementById("add-port").value = "";
    }

    async function applyInstance(id) { render(await api("POST", "/instances/" + id, form(id))); }
    async function ctrl(id, action) { render(await api("POST", `/instances/${id}/${action}`)); }
    async function removeInstance(id) {
      if (!confirm("Supprimer " + id + " ?")) return;
      render(await api("DELETE", "/instances/" + id));
    }

    async function refresh() {
      try { render(await (await fetch("/status", { cache: "no-store" })).json()); }
      catch (e) { document.getElementById("updated").textContent = "déconnecté"; }
    }

    async function refreshLogs() {
      const src = document.getElementById("log-source").value || "client";
      try {
        const txt = await (await fetch(`/logs/${src}?lines=400`, { cache: "no-store" })).text();
        const pre = document.getElementById("logs");
        const atBottom = pre.scrollTop + pre.clientHeight >= pre.scrollHeight - 20;
        pre.textContent = txt || "(vide)";
        if (atBottom) pre.scrollTop = pre.scrollHeight;
      } catch (e) { /* ignore */ }
    }

    refresh();
    refreshLogs();
    setInterval(refresh, 2000);
    setInterval(refreshLogs, 2000);
  </script>
</body>
</html>
